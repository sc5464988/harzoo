site_name: Harzoo

docs_dir: docs
site_dir: site

hooks:
  - docs/mkdocs_doc_hooks.py

theme:
  name: material
  features:
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/baidu-hm.js
plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite

exclude_docs: |
  official-config/**
  templates/**
  reference/**

# official-config/ 为官方配置源文件，构建时复制到 site/downloads/
validation:
  links:
    not_found: ignore
